<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --page-bg: #fdf6e3;
      --text-color: #2c2417;
      --heading-color: #1a5e3a;
      --arabic-color: #1a3a5e;
      --note-bg: #f5edd6;
      --cover-accent: #c9a84c;
      --sidebar-bg: #1e3a2a;
      --sidebar-text: #e8dcc8;
      --bar-bg: rgba(0,0,0,0.5);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: linear-gradient(135deg, #2c2417 0%, #1a1a2e 50%, #2c2417 100%);
      height: 100vh;
      display: flex;
      color: var(--text-color);
    }

    /* ── Sidebar / Table of Contents ── */
    .sidebar {
      width: 0;
      min-width: 0;
      height: 100vh;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      transition: width 0.4s ease, min-width 0.4s ease, padding 0.4s ease;
      padding: 0;
      flex-shrink: 0;
      border-right: 3px solid var(--cover-accent);
      scrollbar-width: thin;
      scrollbar-color: var(--cover-accent) var(--sidebar-bg);
    }

    .sidebar.open {
      width: 340px;
      min-width: 340px;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 1.2rem;
      color: var(--cover-accent);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(201, 168, 76, 0.3);
      white-space: nowrap;
    }

    .toc-chapter { margin-bottom: 15px; }

    .toc-chapter-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--cover-accent);
      padding: 8px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-chapter-title:hover { background: rgba(255,255,255,0.1); }

    .toc-sections {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .toc-sections.expanded { max-height: 2000px; }

    .toc-section {
      font-size: 0.82rem;
      padding: 5px 10px 5px 25px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-section:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .toc-section.active {
      background: rgba(201, 168, 76, 0.2);
      color: var(--cover-accent);
      font-weight: 600;
    }

    .toc-chapter-title.active {
      background: rgba(201, 168, 76, 0.15);
    }

    /* ── Main Area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      height: 100vh;
      min-height: 0;
    }

    /* ── Top Bar ── */
    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: var(--bar-bg);
      backdrop-filter: blur(10px);
      z-index: 100;
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }

    .btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #e8dcc8;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { background: rgba(255,255,255,0.2); }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .btn svg { width: 18px; height: 18px; }

    .book-select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #e8dcc8;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      max-width: 220px;
    }
    .book-select option { background: #1e3a2a; color: #e8dcc8; }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .page-jump {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-jump input {
      width: 60px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #e8dcc8;
      font-size: 0.85rem;
      font-family: inherit;
      text-align: center;
    }

    .page-jump input::placeholder { color: rgba(232,220,200,0.5); }

    /* ── Page Area ── */
    .page-wrapper {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    .page {
      width: 580px;
      max-height: 100%;
      background: var(--page-bg);
      padding: 45px 48px 55px;
      overflow-y: auto;
      position: relative;
      line-height: 1.85;
      font-size: 0.93rem;
      border-radius: 10px;
      box-shadow:
        0 4px 30px rgba(0,0,0,0.35),
        0 0 0 1px rgba(0,0,0,0.08);
      scrollbar-width: thin;
      scrollbar-color: #c4b99a transparent;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .page::-webkit-scrollbar { width: 6px; }
    .page::-webkit-scrollbar-thumb { background: #c4b99a; border-radius: 3px; }
    .page::-webkit-scrollbar-track { background: transparent; }

    /* Paper texture */
    .page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(0,0,0,0.01) 28px,
          rgba(0,0,0,0.01) 29px
        );
      pointer-events: none;
      border-radius: 10px;
      z-index: 1;
    }

    .page-number-label {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: #8a7e6b;
      font-weight: 500;
      z-index: 2;
    }

    /* Slide transitions */
    .page.slide-out-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .page.slide-out-right {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .page.slide-in {
      opacity: 1;
      transform: translateX(0);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    /* ── Content Styling ── */
    .page-content { position: relative; z-index: 2; }

    .page-content .heading {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--heading-color);
      margin: 16px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(26, 94, 58, 0.2);
      line-height: 1.5;
    }

    .page-content .arabic-inline-label {
      direction: ltr;
      text-align: right;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--heading-color);
      margin: 10px 0 4px;
      letter-spacing: 0.2px;
    }

    .page-content .arabic-text,
    .page-content ar {
      display: block;
      font-family: 'Amiri', 'Noto Naskh Arabic', serif;
      direction: rtl;
      text-align: right;
      font-size: 1.25rem;
      line-height: 2.2;
      color: var(--arabic-color);
      margin: 12px 0;
      padding: 10px 15px;
      background: rgba(26, 58, 94, 0.04);
      border-radius: 6px;
      border-right: 3px solid rgba(26, 58, 94, 0.2);
    }

    .page-content .arabic-inline-label + .arabic-text {
      margin-top: 4px;
    }

    .page-content .note {
      font-size: 0.78rem;
      color: #6b6050;
      background: var(--note-bg);
      padding: 10px 14px;
      border-radius: 6px;
      margin: 8px 0;
      border-left: 3px solid var(--cover-accent);
      line-height: 1.7;
    }

    .page-content .section-footnotes {
      margin-top: 24px;
      padding-top: 14px;
      border-top: 1px dashed #b8a88a;
    }

    .page-content .section-footnotes-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #8a7e6b;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .page-content p {
      margin-bottom: 8px;
      text-align: justify;
    }

    /* ── Bottom Pagination Bar ── */
    .pagination-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--bar-bg);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .pagination-bar .page-indicator {
      color: var(--cover-accent);
      font-size: 0.88rem;
      font-weight: 500;
      min-width: 160px;
      text-align: center;
    }

    .pagination-bar .nav-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #e8dcc8;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pagination-bar .nav-btn:hover { background: rgba(255,255,255,0.2); }
    .pagination-bar .nav-btn:disabled { opacity: 0.25; cursor: default; }

    /* ── Loading Screen ── */
    .loading {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #2c2417, #1a1a2e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: var(--cover-accent);
      transition: opacity 0.5s;
    }

    .loading.hidden { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(201,168,76,0.2);
      border-top-color: var(--cover-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .page { width: 100%; font-size: 0.86rem; padding: 30px 24px 50px; border-radius: 0; }
      .page-wrapper { padding: 10px; }
      .sidebar.open { width: 280px; min-width: 280px; }
      .topbar { padding: 8px 12px; }
      .pagination-bar { padding: 10px 12px; }
    }

    /* ── Dark mode ── */
    body.dark-mode {
      --page-bg: #1e1e1e;
      --text-color: #d4c9b8;
      --heading-color: #4eca7a;
      --arabic-color: #6eb5e0;
      --note-bg: #2a2a2a;
    }

    body.dark-mode .page { box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div>Loading book...</div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main Area -->
  <div class="main">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn" id="tocToggle" title="Table of Contents">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          সূচিপত্র
        </button>
      </div>
      <div class="topbar-center" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <select class="book-select" id="bookSelect" title="Parsed books (from output/)">
          <option value="">Loading books...</option>
        </select>
        <select class="book-select" id="directBookSelect" title="Direct books (from direct-books/)">
          <option value="">Direct books…</option>
        </select>
        <button class="btn" id="loadJsonBtn" title="Load a JSON book from disk">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Load JSON
        </button>
        <input type="file" id="jsonFileInput" accept=".json,application/json" style="display:none;">
        <button class="btn" id="downloadXlsxBtn" title="Download current book as XLSX">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          XLSX
        </button>
      </div>
      <div class="topbar-right">
        <div class="page-jump">
          <input type="number" id="pageInput" placeholder="পৃষ্ঠা" min="1">
          <button class="btn" id="goToPage">Go</button>
        </div>
        <button class="btn" id="darkToggle" title="Toggle dark mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>

    <!-- Page -->
    <div class="page-wrapper">
      <div class="page" id="page">
        <div class="page-content" id="pageContent"></div>
        <div class="page-number-label" id="pageNumLabel"></div>
      </div>
    </div>

    <!-- Bottom Pagination -->
    <div class="pagination-bar">
      <button class="nav-btn" id="firstBtn" title="First page">&#9664;&#9664;</button>
      <button class="nav-btn" id="prevBtn" title="Previous">&#9664;</button>
      <span class="page-indicator" id="pageIndicator"></span>
      <button class="nav-btn" id="nextBtn" title="Next">&#9654;</button>
      <button class="nav-btn" id="lastBtn" title="Last page">&#9654;&#9654;</button>
    </div>
  </div>

  <script>
    // ── State ──
    let pages = [];
    let tocData = [];
    let currentPage = 0;
    let isAnimating = false;
    let booksIndex = [];
    let directBooksIndex = [];
    const uploadedBooks = new Map();
    let uploadedBookSeq = 0;

    // ── Render TOC ──
    function renderTOC() {
      const sidebar = document.getElementById('sidebar');
      let tocHTML = `<h2>সূচিপত্র</h2>`;

      tocData.forEach((chapter, ci) => {
        const chapterTitle = chapter.chapter || '';
        const chapterSections = Array.isArray(chapter.sections) ? chapter.sections : [];
        const chapterClick = chapterSections.length
          ? `toggleChapter(${ci})`
          : `goToChapter('${escapeAttr(chapterTitle)}', ${ci})`;

        tocHTML += `<div class="toc-chapter">
          <div class="toc-chapter-title" onclick="${chapterClick}" title="${chapterTitle}">
            ${chapterTitle}
          </div>
          <div class="toc-sections" id="tocSections${ci}">`;

        chapterSections.forEach(section => {
          tocHTML += `<div class="toc-section" onclick="goToSection('${escapeAttr(section)}')" title="${section}">${section}</div>`;
        });

        tocHTML += `</div></div>`;
      });

      sidebar.innerHTML = tocHTML;
    }

    function escapeAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function toggleChapter(idx) {
      document.getElementById(`tocSections${idx}`).classList.toggle('expanded');
    }

    function normalizeTitleForMatch(text) {
      return (text || '')
        .replace(/<br\s*\/?>/gi, ' ')
        .replace(/<[^>]+>/g, ' ')
        .replace(/[-\u2010-\u2015]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function closeSidebarOnMobile() {
      if (window.innerWidth < 900) {
        document.getElementById('sidebar').classList.remove('open');
      }
    }

    function goToSection(sectionTitle) {
      for (let i = 0; i < pages.length; i++) {
        const heading = (pages[i].sectionHeading || '').trim();
        if (heading && heading === sectionTitle) {
          goToPage(i);
          highlightTocItem(sectionTitle);
          closeSidebarOnMobile();
          return;
        }
      }

      // Backward compatibility for older outputs without sectionHeading.
      for (let i = 0; i < pages.length; i++) {
        if (pages[i].html.includes(sectionTitle)) {
          goToPage(i);
          highlightTocItem(sectionTitle);
          closeSidebarOnMobile();
          return;
        }
      }
    }

    function goToChapter(chapterTitle, chapterIndex) {
      const chapterNorm = normalizeTitleForMatch(chapterTitle);
      if (!chapterNorm) return;

      for (let i = 0; i < pages.length; i++) {
        const headingNorm = normalizeTitleForMatch(pages[i].sectionHeading || '');
        if (!headingNorm) continue;

        if (
          headingNorm === chapterNorm ||
          headingNorm.includes(chapterNorm) ||
          chapterNorm.includes(headingNorm)
        ) {
          goToPage(i);
          highlightChapterItem(chapterIndex, chapterTitle);
          closeSidebarOnMobile();
          return;
        }
      }

      // Backward compatibility for older outputs without sectionHeading.
      for (let i = 0; i < pages.length; i++) {
        if (normalizeTitleForMatch(pages[i].html || '').includes(chapterNorm)) {
          goToPage(i);
          highlightChapterItem(chapterIndex, chapterTitle);
          closeSidebarOnMobile();
          return;
        }
      }
    }

    function highlightChapterItem(chapterIndex, chapterTitle) {
      const sidebar = document.getElementById('sidebar');

      sidebar.querySelectorAll('.toc-section.active').forEach(el => el.classList.remove('active'));
      sidebar.querySelectorAll('.toc-chapter-title.active').forEach(el => el.classList.remove('active'));

      let chapterTitleEl = null;
      if (Number.isInteger(chapterIndex)) {
        const sectionsDiv = document.getElementById(`tocSections${chapterIndex}`);
        if (sectionsDiv) chapterTitleEl = sectionsDiv.previousElementSibling;
      }

      if (!chapterTitleEl) {
        const allChapters = sidebar.querySelectorAll('.toc-chapter-title');
        for (const item of allChapters) {
          if (item.textContent.trim() === (chapterTitle || '').trim()) {
            chapterTitleEl = item;
            break;
          }
        }
      }

      if (!chapterTitleEl) return;

      chapterTitleEl.classList.add('active');
      const targetTop = chapterTitleEl.offsetTop - ((sidebar.clientHeight - chapterTitleEl.offsetHeight) / 2);
      sidebar.scrollTo({
        top: Math.max(0, targetTop),
        behavior: 'smooth'
      });
    }

    function highlightTocItem(sectionTitle) {
      const sidebar = document.getElementById('sidebar');

      // Clear previous active states
      sidebar.querySelectorAll('.toc-section.active').forEach(el => el.classList.remove('active'));
      sidebar.querySelectorAll('.toc-chapter-title.active').forEach(el => el.classList.remove('active'));

      // Find and highlight the matching section
      const allSections = sidebar.querySelectorAll('.toc-section');
      for (const sec of allSections) {
        if (sec.textContent.trim() === sectionTitle) {
          sec.classList.add('active');

          // Expand and highlight parent chapter
          const chapter = sec.closest('.toc-chapter');
          if (chapter) {
            const sectionsDiv = chapter.querySelector('.toc-sections');
            if (sectionsDiv && !sectionsDiv.classList.contains('expanded')) {
              sectionsDiv.classList.add('expanded');
            }
            const chapterTitle = chapter.querySelector('.toc-chapter-title');
            if (chapterTitle) chapterTitle.classList.add('active');
          }

          // Scroll only inside sidebar (avoid moving the main viewport)
          const targetTop = sec.offsetTop - ((sidebar.clientHeight - sec.offsetHeight) / 2);
          sidebar.scrollTo({
            top: Math.max(0, targetTop),
            behavior: 'smooth'
          });
          break;
        }
      }
    }

    // ── Rendering ──
    function rewriteArTags(root) {
      const arEls = root.querySelectorAll('ar');
      arEls.forEach(el => {
        const div = document.createElement('div');
        div.className = 'arabic-text';
        while (el.firstChild) div.appendChild(el.firstChild);
        for (const attr of el.attributes) {
          if (attr.name === 'class') {
            div.className = ('arabic-text ' + attr.value).trim();
          } else {
            div.setAttribute(attr.name, attr.value);
          }
        }
        el.parentElement.replaceChild(div, el);
      });
    }

    function fixMergedArabicHeadings(root) {
      const headings = root.querySelectorAll('.arabic-text > .heading');

      headings.forEach(heading => {
        const arabicBox = heading.parentElement;
        if (!arabicBox || !arabicBox.parentElement) return;

        arabicBox.parentElement.insertBefore(heading, arabicBox);

        while (
          arabicBox.firstChild &&
          arabicBox.firstChild.nodeType === Node.TEXT_NODE &&
          !arabicBox.firstChild.textContent.trim()
        ) {
          arabicBox.removeChild(arabicBox.firstChild);
        }

        if (!arabicBox.textContent.trim()) {
          arabicBox.remove();
        }
      });

      const arabicBoxes = root.querySelectorAll('.arabic-text');
      const arabicCharRegex = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/;
      const bengaliCharRegex = /[\u0980-\u09FF]/;
      const bengaliLabelHintRegex = /(দু['’]?আ|দো['’]?আ|দুয়া|দোয়া|আমল|দুরূদ|যিকির|তাসবীহ|সালাম)/;

      arabicBoxes.forEach(arabicBox => {
        const compactText = arabicBox.textContent.replace(/\s+/g, ' ').trim();
        const firstArabicIndex = compactText.search(arabicCharRegex);
        if (firstArabicIndex <= 0) return;

        const prefix = compactText.slice(0, firstArabicIndex).trim();
        const arabicOnly = compactText.slice(firstArabicIndex).trim();
        if (!prefix || !arabicOnly) return;

        const looksLikeLabel =
          bengaliCharRegex.test(prefix) &&
          prefix.length <= 64 &&
          (
            prefix.includes(':') ||
            prefix.includes('ঃ') ||
            /[\u09E6-\u09EF0-9]/.test(prefix) ||
            bengaliLabelHintRegex.test(prefix)
          );

        if (!looksLikeLabel) return;

        const labelEl = document.createElement('div');
        labelEl.className = 'arabic-inline-label';
        labelEl.textContent = prefix;

        arabicBox.parentElement.insertBefore(labelEl, arabicBox);
        arabicBox.textContent = arabicOnly;
      });
    }

    function renderPage(idx) {
      const pageEl = document.getElementById('page');
      const contentEl = document.getElementById('pageContent');
      const numEl = document.getElementById('pageNumLabel');
      const indicator = document.getElementById('pageIndicator');

      contentEl.innerHTML = pages[idx].html;
      rewriteArTags(contentEl);
      fixMergedArabicHeadings(contentEl);
      numEl.textContent = pages[idx].label;
      pageEl.scrollTop = 0;

      indicator.textContent = `পৃষ্ঠা ${pages[idx].label}  —  ${idx + 1} / ${pages.length}`;

      document.getElementById('prevBtn').disabled = idx === 0;
      document.getElementById('firstBtn').disabled = idx === 0;
      document.getElementById('nextBtn').disabled = idx === pages.length - 1;
      document.getElementById('lastBtn').disabled = idx === pages.length - 1;
    }

    function goToPage(idx, direction) {
      idx = Math.max(0, Math.min(idx, pages.length - 1));
      if (idx === currentPage && pages.length > 0) return;

      const pageEl = document.getElementById('page');

      if (isAnimating) return;

      // If no direction given, infer from index
      if (direction === undefined) {
        direction = idx > currentPage ? 'forward' : 'backward';
      }

      // If first render (no pages loaded yet), just show it
      if (pages.length === 0 || currentPage === idx) {
        currentPage = idx;
        renderPage(currentPage);
        return;
      }

      isAnimating = true;

      // Slide out
      pageEl.classList.add(direction === 'forward' ? 'slide-out-left' : 'slide-out-right');

      setTimeout(() => {
        currentPage = idx;
        renderPage(currentPage);

        // Instantly position on opposite side
        pageEl.classList.remove('slide-out-left', 'slide-out-right', 'slide-in');
        pageEl.style.transform = direction === 'forward' ? 'translateX(40px)' : 'translateX(-40px)';
        pageEl.style.opacity = '0';

        // Force reflow
        void pageEl.offsetWidth;

        // Slide in
        pageEl.style.transform = '';
        pageEl.style.opacity = '';
        pageEl.classList.add('slide-in');

        setTimeout(() => {
          pageEl.classList.remove('slide-in');
          isAnimating = false;
        }, 250);
      }, 200);
    }

    // ── Event Listeners ──
    document.getElementById('nextBtn').addEventListener('click', () => goToPage(currentPage + 1, 'forward'));
    document.getElementById('prevBtn').addEventListener('click', () => goToPage(currentPage - 1, 'backward'));
    document.getElementById('firstBtn').addEventListener('click', () => goToPage(0, 'backward'));
    document.getElementById('lastBtn').addEventListener('click', () => goToPage(pages.length - 1, 'forward'));

    document.getElementById('tocToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    document.getElementById('darkToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
    });

    document.getElementById('goToPage').addEventListener('click', () => {
      const val = document.getElementById('pageInput').value.trim();
      if (!val) return;
      const num = val.replace(/[০-৯]/g, d => '০১২৩৪৫৬৭৮৯'.indexOf(d));
      // Search through originalLabels to find which section contains this page
      for (let i = 0; i < pages.length; i++) {
        const labels = pages[i].originalLabels || [pages[i].label];
        for (const lbl of labels) {
          const lblNum = lbl.replace(/[০-৯]/g, d => '০১২৩৪৫৬৭৮৯'.indexOf(d));
          if (lblNum === num || lbl === val) {
            goToPage(i);
            document.getElementById('pageInput').value = '';
            return;
          }
        }
      }
      const idx = parseInt(num) - 1;
      if (!isNaN(idx)) goToPage(idx);
      document.getElementById('pageInput').value = '';
    });

    document.getElementById('pageInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('goToPage').click();
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        goToPage(currentPage + 1, 'forward');
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        goToPage(currentPage - 1, 'backward');
      } else if (e.key === 'Home') {
        e.preventDefault();
        goToPage(0, 'backward');
      } else if (e.key === 'End') {
        e.preventDefault();
        goToPage(pages.length - 1, 'forward');
      }
    });

    // Touch swipe
    let touchStartX = 0;
    document.querySelector('.page-wrapper').addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });

    document.querySelector('.page-wrapper').addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) goToPage(currentPage + 1, 'forward');
        else goToPage(currentPage - 1, 'backward');
      }
    }, { passive: true });

    // ── Book Selector ──
    document.getElementById('bookSelect').addEventListener('change', (e) => {
      const path = e.target.value;
      if (!path) return;
      document.getElementById('directBookSelect').value = '';
      loadBook(path);
    });

    document.getElementById('directBookSelect').addEventListener('change', (e) => {
      const path = e.target.value;
      if (!path) return;
      document.getElementById('bookSelect').value = '';
      loadBook(path);
    });

    function renderBook(bookData, title) {
      if (!bookData || !Array.isArray(bookData.pages)) {
        throw new Error('Invalid book JSON: missing "pages" array.');
      }
      pages = bookData.pages;
      tocData = Array.isArray(bookData.toc) ? bookData.toc : [];

      renderTOC();
      currentPage = -1; // force first render
      goToPage(0);

      if (title) document.title = title + ' - Book Viewer';
    }

    function findOptionLabel(selectEl, value) {
      if (!selectEl) return '';
      const opt = Array.from(selectEl.options).find(o => o.value === value);
      return opt ? opt.textContent : '';
    }

    function refreshDirectBooksDropdown(selectedValue = '') {
      const directSel = document.getElementById('directBookSelect');
      const preservedValue = selectedValue || directSel.value || '';
      directSel.innerHTML = '';

      const hasIndexed = Array.isArray(directBooksIndex) && directBooksIndex.length > 0;
      const hasUploaded = uploadedBooks.size > 0;

      if (!hasIndexed && !hasUploaded) {
        directSel.innerHTML = '<option value="">Direct books (empty)</option>';
        return;
      }

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = 'Direct books...';
      directSel.appendChild(placeholder);

      if (hasIndexed) {
        directBooksIndex.forEach(book => {
          const opt = document.createElement('option');
          opt.value = book.path || `direct-books/${book.file || book.id}`;
          opt.textContent = book.name || book.id || book.file || 'Untitled';
          directSel.appendChild(opt);
        });
      }

      if (hasUploaded) {
        for (const [virtualPath, entry] of uploadedBooks.entries()) {
          const opt = document.createElement('option');
          opt.value = virtualPath;
          opt.textContent = entry.name;
          directSel.appendChild(opt);
        }
      }

      if (preservedValue && Array.from(directSel.options).some(o => o.value === preservedValue)) {
        directSel.value = preservedValue;
      }
    }

    function upsertUploadedBook(displayName, bookData) {
      let existingPath = '';
      for (const [path, entry] of uploadedBooks.entries()) {
        if (entry.name === displayName) {
          existingPath = path;
          break;
        }
      }

      const virtualPath = existingPath || `uploaded://${Date.now()}-${++uploadedBookSeq}`;
      uploadedBooks.set(virtualPath, { name: displayName, data: bookData });
      refreshDirectBooksDropdown(virtualPath);
      return virtualPath;
    }

    async function loadBook(jsonPath) {
      document.getElementById('loading').classList.remove('hidden');

      try {
        let bookData = null;
        if (jsonPath.startsWith('uploaded://')) {
          const uploaded = uploadedBooks.get(jsonPath);
          if (!uploaded) {
            throw new Error('Uploaded book not found. Please load the JSON again.');
          }
          bookData = uploaded.data;
        } else {
          const res = await fetch(jsonPath);
          if (!res.ok) {
            throw new Error(`Failed to fetch book JSON (${res.status}).`);
          }
          bookData = await res.json();
        }

        // Title can come from either selector (whichever currently matches this path).
        const bookSel = document.getElementById('bookSelect');
        const directSel = document.getElementById('directBookSelect');
        let title = findOptionLabel(bookSel, jsonPath) || findOptionLabel(directSel, jsonPath);
        if (!title && jsonPath.startsWith('uploaded://')) {
          title = uploadedBooks.get(jsonPath)?.name || '';
        }
        renderBook(bookData, title);

        setTimeout(() => {
          document.getElementById('loading').classList.add('hidden');
        }, 300);

      } catch (err) {
        console.error('Error loading book:', err);
        document.getElementById('loading').innerHTML = `
          <div style="color:#e74c3c; text-align:center;">
            <p>Error loading book data.</p>
            <p style="font-size:0.8rem; margin-top:10px; color:#999;">${err.message}</p>
            <p style="font-size:0.75rem; margin-top:15px; color:#888;">
              Serve via a local server (not file://).<br>
              Run: <code style="color:var(--cover-accent)">npx serve</code> or <code style="color:var(--cover-accent)">python -m http.server</code>
            </p>
          </div>
        `;
      }
    }

    // ── Direct-JSON Loader (no parser / server required) ──
    document.getElementById('loadJsonBtn').addEventListener('click', () => {
      document.getElementById('jsonFileInput').click();
    });

    document.getElementById('jsonFileInput').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      document.getElementById('loading').classList.remove('hidden');
      const reader = new FileReader();

      reader.onload = (ev) => {
        try {
          const bookData = JSON.parse(ev.target.result);
          if (!bookData || !Array.isArray(bookData.pages)) {
            throw new Error('Invalid book JSON: missing \"pages\" array.');
          }
          const displayName = file.name.replace(/\.json$/i, '');
          const virtualPath = upsertUploadedBook(displayName, bookData);

          // Reset both selectors so the picked file is clearly active.
          document.getElementById('bookSelect').value = '';
          document.getElementById('directBookSelect').value = virtualPath;

          renderBook(bookData, displayName);

          setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
          }, 300);
        } catch (err) {
          console.error('Error parsing JSON:', err);
          document.getElementById('loading').innerHTML = `
            <div style="color:#e74c3c; text-align:center;">
              <p>Could not load this JSON file.</p>
              <p style="font-size:0.8rem; margin-top:10px; color:#999;">${err.message}</p>
            </div>
          `;
        }
      };

      reader.onerror = () => {
        document.getElementById('loading').innerHTML = `
          <div style="color:#e74c3c; text-align:center;">
            <p>Could not read the selected file.</p>
          </div>
        `;
      };

      reader.readAsText(file);
      // Allow picking the same file again later.
      e.target.value = '';
    });

    // ── XLSX Download (mirrors parser.py output format) ──
    function normalizeTitleForXlsx(value) {
      return (value || '').replace(/\s+/g, ' ').trim();
    }

    function extractPlainFromHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html || '';

      let notesText = '';
      const footnotes = tmp.querySelector('.section-footnotes');
      if (footnotes) {
        const noteEl = footnotes.querySelector('.note');
        if (noteEl) {
          noteEl.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
          notesText = noteEl.textContent.trim();
        }
        footnotes.remove();
      }

      tmp.querySelectorAll('.heading').forEach(el => el.remove());
      tmp.querySelectorAll('br').forEach(br => br.replaceWith('\n'));

      let contentText = tmp.textContent.replace(/\n{3,}/g, '\n\n').trim();
      return { content: contentText, notes: notesText };
    }

    function currentBookDisplayName() {
      const bookSel = document.getElementById('bookSelect');
      const directSel = document.getElementById('directBookSelect');
      let name = '';
      if (bookSel.value) name = findOptionLabel(bookSel, bookSel.value);
      else if (directSel.value) name = findOptionLabel(directSel, directSel.value);
      return (name || 'book-output').replace(/[\\/:*?"<>|]/g, '_');
    }

    function triggerBlobDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();

      // Revoke later: immediate revoke can cancel large-file downloads in some browsers.
      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
      }, 15000);
    }

    async function downloadXlsx() {
      if (!pages.length) {
        alert('No book loaded.');
        return;
      }
      if (typeof ExcelJS === 'undefined') {
        alert('ExcelJS library failed to load. Check your internet connection.');
        return;
      }

      const workbook = new ExcelJS.Workbook();
      const ws = workbook.addWorksheet('Book Content');

      ws.columns = [
        { header: 'chapter_id', key: 'chapter_id', width: 12 },
        { header: 'chapter_name', key: 'chapter_name', width: 35 },
        { header: 'section_id', key: 'section_id', width: 12 },
        { header: 'section_name', key: 'section_name', width: 40 },
        { header: 'content', key: 'content', width: 60 },
        { header: 'notes', key: 'notes', width: 40 },
      ];

      const thinBorder = {
        top: { style: 'thin' }, bottom: { style: 'thin' },
        left: { style: 'thin' }, right: { style: 'thin' },
      };

      const headerRow = ws.getRow(1);
      headerRow.eachCell(cell => {
        cell.font = { bold: true, size: 12, color: { argb: 'FFFFFFFF' } };
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4472C4' } };
        cell.alignment = { horizontal: 'center', vertical: 'center' };
        cell.border = thinBorder;
      });

      const safeToc = Array.isArray(tocData)
        ? tocData.filter(ch => ch && typeof ch === 'object')
        : [];
      const safePages = Array.isArray(pages)
        ? pages.filter(pg => pg && typeof pg === 'object')
        : [];

      function addStyledExportRow(rowData) {
        const row = ws.addRow(rowData);
        row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
          cell.border = thinBorder;
          if (colNumber === 5 || colNumber === 6) {
            cell.alignment = { wrapText: true, vertical: 'top' };
          }
        });
      }

      const chapterMeta = safeToc.map((chapter, chIdx) => {
        const chapterName = (chapter.chapter || '').trim();
        const rawSections = Array.isArray(chapter.sections)
          ? chapter.sections.map(s => String(s || '').trim()).filter(Boolean)
          : [];
        const sections = rawSections.length
          ? rawSections
          : [chapterName || `Chapter ${chIdx + 1}`];
        return { chapterName, rawSections, sections };
      });

      // Map headings to chapter index so pages can be grouped by chapter.
      const headingToChapterIndex = new Map();
      chapterMeta.forEach((meta, chIdx) => {
        const chapterNorm = normalizeTitleForXlsx(meta.chapterName);
        if (chapterNorm && !headingToChapterIndex.has(chapterNorm)) {
          headingToChapterIndex.set(chapterNorm, chIdx);
        }
        meta.rawSections.forEach(sectionName => {
          const sectionNorm = normalizeTitleForXlsx(sectionName);
          if (sectionNorm && !headingToChapterIndex.has(sectionNorm)) {
            headingToChapterIndex.set(sectionNorm, chIdx);
          }
        });
      });

      const chapterPages = chapterMeta.map(() => []);
      let currentChapterIdx = chapterMeta.length ? 0 : -1;
      safePages.forEach(page => {
        const headingNorm = normalizeTitleForXlsx(page.sectionHeading || '');
        if (headingNorm && headingToChapterIndex.has(headingNorm)) {
          currentChapterIdx = headingToChapterIndex.get(headingNorm);
        }
        if (currentChapterIdx >= 0 && currentChapterIdx < chapterPages.length) {
          chapterPages[currentChapterIdx].push(page);
        }
      });

      for (let chIdx = 0; chIdx < chapterMeta.length; chIdx++) {
        const meta = chapterMeta[chIdx];
        const pagesForChapter = chapterPages[chIdx] || [];
        let pageCursor = 0;

        for (let secIdx = 0; secIdx < meta.sections.length; secIdx++) {
          let sectionPages = [];

          if (meta.rawSections.length === 0) {
            // No sections in this chapter: create one section and include all chapter content.
            sectionPages = pagesForChapter.slice(pageCursor);
            pageCursor = pagesForChapter.length;
          } else {
            // Keep one-row-per-section; if extra pages exist, append them to the last section.
            if (pageCursor < pagesForChapter.length) {
              sectionPages.push(pagesForChapter[pageCursor]);
              pageCursor += 1;
            }
            if (secIdx === meta.sections.length - 1 && pageCursor < pagesForChapter.length) {
              sectionPages = sectionPages.concat(pagesForChapter.slice(pageCursor));
              pageCursor = pagesForChapter.length;
            }
          }

          let content = '';
          let notes = '';
          if (sectionPages.length) {
            const extractedParts = sectionPages.map(pg => extractPlainFromHtml(pg.html || ''));
            content = extractedParts.map(part => part.content).filter(Boolean).join('\n\n');
            notes = extractedParts.map(part => part.notes).filter(Boolean).join('\n\n');
          }

          addStyledExportRow({
            chapter_id: chIdx + 1,
            chapter_name: meta.chapterName,
            section_id: secIdx + 1,
            section_name: meta.sections[secIdx],
            content,
            notes,
          });
        }
      }

      // Fallback for direct/manual JSONs that have no usable TOC sections.
      if (ws.rowCount <= 1) {
        for (let i = 0; i < safePages.length; i++) {
          const page = safePages[i];
          const extracted = extractPlainFromHtml(page.html || '');
          addStyledExportRow({
            chapter_id: '',
            chapter_name: '',
            section_id: i + 1,
            section_name: page.sectionHeading || `Page ${page.label || i + 1}`,
            content: extracted.content,
            notes: extracted.notes,
          });
        }
      }

      ws.views = [{ state: 'frozen', ySplit: 1 }];

      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
      });
      triggerBlobDownload(blob, `${currentBookDisplayName()}.xlsx`);
    }

    document.getElementById('downloadXlsxBtn').addEventListener('click', () => {
      downloadXlsx().catch(err => {
        console.error('XLSX download failed:', err);
        alert('Could not generate XLSX: ' + err.message);
      });
    });

    // ── Direct-Books Index (separate list) ──
    async function loadDirectBooksIndex() {
      try {
        const res = await fetch('direct-books/direct-books-index.json');
        if (!res.ok) throw new Error('no index');
        const list = await res.json();
        directBooksIndex = Array.isArray(list) ? list : [];
      } catch {
        directBooksIndex = [];
      }
      refreshDirectBooksDropdown();
    }
    async function init() {
      const select = document.getElementById('bookSelect');

      // Populate the direct-books list in parallel; its failure must not block the main list.
      loadDirectBooksIndex();

      try {
        // Try loading the books index
        const indexRes = await fetch('output/books-index.json');
        booksIndex = await indexRes.json();

        select.innerHTML = '';

        if (booksIndex.length === 0) {
          select.innerHTML = '<option value="">No books found</option>';
          document.getElementById('loading').innerHTML = `
            <div style="color:#e74c3c; text-align:center;">
              <p>No books found.</p>
              <p style="font-size:0.8rem; margin-top:10px; color:#999;">Run <code style="color:var(--cover-accent)">python parser.py</code> to parse books.</p>
            </div>
          `;
          return;
        }

        booksIndex.forEach((book, i) => {
          const opt = document.createElement('option');
          opt.value = book.path;
          opt.textContent = book.name;
          select.appendChild(opt);
        });

        // Load the first book (or from URL hash)
        const hashBook = window.location.hash.slice(1);
        const target = booksIndex.find(b => b.id === hashBook) || booksIndex[0];
        select.value = target.path;
        await loadBook(target.path);

      } catch (err) {
        // Fallback: try legacy book-output.json in root
        try {
          select.innerHTML = '<option value="book-output.json">Default Book</option>';
          await loadBook('book-output.json');
        } catch (fallbackErr) {
          console.error('Error loading books:', err);
          document.getElementById('loading').innerHTML = `
            <div style="color:#e74c3c; text-align:center;">
              <p>No books found.</p>
              <p style="font-size:0.8rem; margin-top:10px; color:#999;">
                Run <code style="color:var(--cover-accent)">python parser.py</code> to parse books first.
              </p>
              <p style="font-size:0.75rem; margin-top:15px; color:#888;">
                Serve via a local server (not file://).<br>
                Run: <code style="color:var(--cover-accent)">npx serve</code> or <code style="color:var(--cover-accent)">python -m http.server</code>
              </p>
            </div>
          `;
        }
      }
    }

    init();
  </script>
</body>
</html>
